{% load i18n %}
{% if res.conversion_status == 'ready' %}
    <span class="badge badge-sm bg-success">
        <i class="fa fa-check me-1"></i>{% trans "Готово" %}
    </span>
{% elif res.conversion_status == 'processing' %}
    <span class="badge badge-sm bg-warning">
        <i class="fa fa-clock me-1"></i>{% trans "В процессе" %}
    </span>
{% else %}
    <span class="badge badge-sm bg-danger">
        <i class="fa fa-times me-1"></i>{% trans "Ошибка" %}
    </span>
{% endif %}
